global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'bookmyvenue-backend'
    scrape_interval: 5s
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/api/v1/metrics' # We'll expose metrics here later
