apiVersion: v1
kind: Service
metadata:
  name: {{ include "bookmyvenue.fullname" . }}-backend
  labels:
    {{- include "bookmyvenue.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    {{- include "bookmyvenue.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  type: ClusterIP
