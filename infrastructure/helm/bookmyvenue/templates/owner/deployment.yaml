apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bookmyvenue.fullname" . }}-owner
  labels:
    {{- include "bookmyvenue.labels" . | nindent 4 }}
    app.kubernetes.io/component: owner
spec:
  replicas: {{ .Values.owner.replicaCount }}
  selector:
    matchLabels:
      {{- include "bookmyvenue.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: owner
  template:
    metadata:
      labels:
        {{- include "bookmyvenue.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: owner
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: owner
          image: "{{ .Values.owner.image.repository }}:{{ .Values.owner.image.tag }}"
          imagePullPolicy: {{ .Values.owner.image.pullPolicy }}
          ports:
            - containerPort: 3002
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: "production"
            - name: NEXT_PUBLIC_API_URL
              value: "http://{{ .Values.global.domain }}/api/v1"
          livenessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.owner.resources | nindent 12 }}
