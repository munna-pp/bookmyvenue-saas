services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: bmv-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - bmv-prod-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: bmv-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - bmv-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Express Backend Monolith
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.prod
    container_name: bmv-backend-prod
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=prod-jwt-secret-key-must-be-long-and-secure-change-it
      - JWT_REFRESH_SECRET=prod-jwt-refresh-secret-key-must-be-long-and-secure-change-it
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 512M
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bmv-prod-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Client-Facing Web App
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: bmv-web-app-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bmv-prod-network

  # Admin Dashboard App
  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile
    container_name: bmv-admin-app-prod
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bmv-prod-network

  # Owner Dashboard App
  owner:
    build:
      context: .
      dockerfile: ./apps/owner/Dockerfile
    container_name: bmv-owner-app-prod
    restart: always
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api/v1
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bmv-prod-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: bmv-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - admin
      - owner
      - backend
    networks:
      - bmv-prod-network

  # Prometheus (Metrics Collector)
  prometheus:
    image: prom/prometheus:latest
    container_name: bmv-prometheus-prod
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
    depends_on:
      - alertmanager
    networks:
      - bmv-prod-network

  # Alertmanager (Alert router)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: bmv-alertmanager-prod
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./infrastructure/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - bmv-prod-network

  # Loki (Log Engine)
  loki:
    image: grafana/loki:2.9.2
    container_name: bmv-loki-prod
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - bmv-prod-network

  # Promtail (Log Shipper)
  promtail:
    image: grafana/promtail:2.9.2
    container_name: bmv-promtail-prod
    restart: always
    volumes:
      - ./infrastructure/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      # For shipping container logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - bmv-prod-network

  # Grafana (Metrics & Logs Viewer)
  grafana:
    image: grafana/grafana:latest
    container_name: bmv-grafana-prod
    restart: always
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infrastructure/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./infrastructure/monitoring/grafana-dashboards-prov.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./infrastructure/monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_prod_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - bmv-prod-network

volumes:
  mongodb_prod_data:
  redis_prod_data:
  grafana_prod_data:

networks:
  bmv-prod-network:
    driver: bridge
