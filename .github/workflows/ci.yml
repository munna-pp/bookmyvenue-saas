name: BookMyVenue CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Verify Code Style (Prettier)
        run: npx prettier --check "**/*.{ts,tsx,js,json,md}"

      - name: Lint Workspaces
        run: npm run lint

      - name: Build Shared Types
        run: npm run build --workspace=packages/shared-types

      - name: Build Backend
        run: npm run build:backend

      - name: Build Next.js Web App
        run: npm run build:web

      - name: Build Next.js Admin App
        run: npm run build:admin

      - name: Build Next.js Owner App
        run: npm run build:owner

  docker-verify:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: bookmyvenue-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: bookmyvenue-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
