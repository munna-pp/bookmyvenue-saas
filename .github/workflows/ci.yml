name: BookMyVenue CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Verify Code Style (Prettier)
        run: npx prettier --check "**/*.{ts,tsx,js,json,md}"

      - name: Lint Workspaces
        run: npm run lint

      - name: Build Monorepo Workspaces
        run: npm run build

  docker-verify:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Production Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.prod
          push: false
          tags: booking-saas-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: booking-saas-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Admin App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: false
          tags: booking-saas-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Owner App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/owner/Dockerfile
          push: false
          tags: booking-saas-owner:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
